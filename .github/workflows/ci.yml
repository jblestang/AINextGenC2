name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MIM_CONFORMANCE_KEYS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - name: Run workspace tests
        run: cargo test --workspace
      - name: Run labeling compliance
        run: cargo run -p ainextgenc2 -- --labeling
      - name: Run MIP4 conformance
        run: cargo run -p ainextgenc2 -- --mip4
